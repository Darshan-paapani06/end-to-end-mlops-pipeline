name: CI/CD - MLOps Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint code
        run: ruff check api src tests

      - name: Train model artifact
        run: python -m src.train --data-path data/raw/sample_churn.csv

      - name: Run tests
        run: pytest -q

      - name: Build Docker image
        run: docker build -t mlops-churn-api:${{ github.sha }} .

  deployment-placeholder:
    runs-on: ubuntu-latest
    needs: test-and-build
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deployment placeholder
        run: |
          echo "Add AWS ECS, GCP Cloud Run, or Azure Container Apps deployment command here."
          echo "This workflow already validates code, tests, model training, and Docker build."
