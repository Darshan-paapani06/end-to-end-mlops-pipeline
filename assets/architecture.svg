<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="650" viewBox="0 0 1200 650">
  <defs>
    <style>
      .title{font-family:Arial, sans-serif;font-size:30px;font-weight:700;fill:#111827}.box{fill:#ffffff;stroke:#2563eb;stroke-width:2;rx:18}.box2{fill:#f8fafc;stroke:#0f766e;stroke-width:2;rx:18}.text{font-family:Arial, sans-serif;font-size:17px;fill:#111827}.small{font-family:Arial, sans-serif;font-size:13px;fill:#475569}.arrow{stroke:#334155;stroke-width:2;marker-end:url(#arrow)}
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#334155"/></marker>
  </defs>
  <rect width="1200" height="650" fill="#f8fafc"/>
  <text x="50" y="55" class="title">End-to-End MLOps Pipeline Architecture</text>
  <text x="50" y="85" class="small">Experiment tracking, reproducible training, model serving, CI/CD, containerization, and monitoring.</text>

  <rect x="60" y="140" width="190" height="95" class="box"/><text x="88" y="178" class="text">Data Source</text><text x="88" y="205" class="small">CSV / warehouse / API</text>
  <rect x="310" y="140" width="190" height="95" class="box"/><text x="345" y="178" class="text">Training Pipeline</text><text x="345" y="205" class="small">preprocess + model fit</text>
  <rect x="560" y="90" width="190" height="95" class="box2"/><text x="600" y="128" class="text">MLflow</text><text x="590" y="155" class="small">runs, params, metrics</text>
  <rect x="560" y="210" width="190" height="95" class="box2"/><text x="590" y="248" class="text">Model Registry</text><text x="590" y="275" class="small">artifact + metadata</text>
  <rect x="810" y="140" width="190" height="95" class="box"/><text x="860" y="178" class="text">FastAPI</text><text x="840" y="205" class="small">real-time inference</text>
  <rect x="60" y="380" width="190" height="95" class="box2"/><text x="93" y="418" class="text">GitHub Actions</text><text x="93" y="445" class="small">lint + tests + build</text>
  <rect x="310" y="380" width="190" height="95" class="box2"/><text x="365" y="418" class="text">Docker</text><text x="345" y="445" class="small">portable deployment</text>
  <rect x="560" y="380" width="190" height="95" class="box"/><text x="605" y="418" class="text">Cloud Deploy</text><text x="600" y="445" class="small">AWS / GCP target</text>
  <rect x="810" y="380" width="190" height="95" class="box"/><text x="852" y="418" class="text">Monitoring</text><text x="835" y="445" class="small">logs, metrics, drift</text>

  <line x1="250" y1="188" x2="310" y2="188" class="arrow"/>
  <line x1="500" y1="170" x2="560" y2="138" class="arrow"/>
  <line x1="500" y1="205" x2="560" y2="255" class="arrow"/>
  <line x1="750" y1="258" x2="810" y2="190" class="arrow"/>
  <line x1="155" y1="235" x2="155" y2="380" class="arrow"/>
  <line x1="250" y1="428" x2="310" y2="428" class="arrow"/>
  <line x1="500" y1="428" x2="560" y2="428" class="arrow"/>
  <line x1="750" y1="428" x2="810" y2="428" class="arrow"/>
  <line x1="905" y1="380" x2="905" y2="235" class="arrow"/>
</svg>
