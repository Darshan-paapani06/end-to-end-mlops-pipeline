services:
  churn-api:
    build: .
    container_name: mlops-churn-api
    ports:
      - "8000:8000"
    env_file:
      - .env.example
    volumes:
      - ./monitoring:/app/monitoring
      - ./models:/app/models
    depends_on:
      - mlflow

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.18.0
    container_name: mlflow-tracking
    ports:
      - "5000:5000"
    command: mlflow ui --host 0.0.0.0 --port 5000
    volumes:
      - ./mlruns:/mlruns
